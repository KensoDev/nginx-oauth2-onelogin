services:

  # ── Simple Node.js app ────────────────────────────────────────────────────
  app:
    build:
      context: ./app
      dockerfile: Dockerfile
    expose:
      - "3000"
    networks:
      - internal

  # ── Nginx reverse proxy ───────────────────────────────────────────────────
  nginx:
    build:
      context: ./nginx
      dockerfile: Dockerfile
    ports:
      - "80:80"
    depends_on:
      - oauth2-proxy
      - app
    networks:
      - internal

  # ── oauth2-proxy: Authentication layer only ───────────────────────────────
  oauth2-proxy:
    image: quay.io/oauth2-proxy/oauth2-proxy:v7.6.0
    command:
      - --provider=oidc
      - --oidc-issuer-url=https://${ONELOGIN_SUBDOMAIN}.onelogin.com/oidc/2
      - --client-id=${ONELOGIN_CLIENT_ID}
      - --client-secret=${ONELOGIN_CLIENT_SECRET}
      - --redirect-url=http://${APP_HOST}/oauth2/callback
      - --upstream=static://200
      - --cookie-secret=${COOKIE_SECRET}
      - --cookie-secure=false
      - --email-domain=*
      - --http-address=0.0.0.0:4180
      - --skip-provider-button=true
      - --reverse-proxy=true
      - --set-xauthrequest=true
      - --pass-user-headers=true
      - --scope=openid email profile groups
    env_file:
      - .env
    expose:
      - "4180"
    networks:
      - internal

networks:
  internal:
    driver: bridge

events {}

http {
  proxy_buffer_size   128k;
  proxy_buffers       4 256k;
  proxy_busy_buffers_size 256k;

  server {
    listen 80;
    location /oauth2/ {
      proxy_pass       http://oauth2-proxy:4180;
      proxy_set_header Host                        $http_host;
      proxy_set_header X-Real-IP                   $remote_addr;
      proxy_set_header X-Scheme                    $scheme;
      proxy_set_header X-Forwarded-Host            $http_host;
      proxy_set_header X-Forwarded-Port            $server_port;
      proxy_set_header X-Auth-Request-Redirect     $request_uri;
      proxy_pass_header Set-Cookie;
    }

    # ── Callback must bypass auth check ──────────────────────────────────────
    location = /oauth2/callback {
      proxy_pass       http://oauth2-proxy:4180;
      proxy_set_header Host              $http_host;
      proxy_set_header X-Real-IP         $remote_addr;
      proxy_set_header X-Scheme          $scheme;
      proxy_set_header X-Forwarded-Host  $http_host;
      proxy_set_header X-Forwarded-Port  $server_port;
      proxy_pass_header Set-Cookie;
    }

    location = /_oauth2_auth {
      internal;
      proxy_pass              http://oauth2-proxy:4180/oauth2/auth;
      proxy_pass_request_body off;
      proxy_set_header        Content-Length  "";
      proxy_set_header        Host            $http_host;
      proxy_set_header        X-Real-IP       $remote_addr;
      proxy_set_header        X-Scheme        $scheme;
      proxy_set_header        X-Original-URI  $request_uri;
    }

    location @sign_in {
      return 302 $scheme://$http_host/oauth2/sign_in?rd=$scheme://$http_host$request_uri;
    }

    location @forbidden {
      return 403 "Access denied: you do not have the required role.\n";
    }

    location / {
      auth_request /_oauth2_auth;

      error_page 401 = @sign_in;
      error_page 403 = @forbidden;

      auth_request_set $user   $upstream_http_x_auth_request_user;
      auth_request_set $email  $upstream_http_x_auth_request_email;
      auth_request_set $token  $upstream_http_x_auth_request_access_token;
      auth_request_set $groups $upstream_http_x_auth_request_groups;
      auth_request_set $cookie $upstream_http_set_cookie;

      proxy_set_header X-Forwarded-User   $user;
      proxy_set_header X-Forwarded-Email  $email;
      proxy_set_header X-Forwarded-Groups $groups;
      proxy_set_header X-Access-Token     $token;
      add_header       Set-Cookie         $cookie;

      proxy_pass       http://app:3000;
      proxy_set_header Host            $http_host;
      proxy_set_header X-Real-IP       $remote_addr;
    }
  }
}
